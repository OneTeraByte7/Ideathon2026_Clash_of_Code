services:
  - type: web
    name: asclepius-api
    env: python
    plan: free
    buildCommand: cd server && pip install --upgrade pip setuptools wheel && pip install -r requirements-render.txt
    startCommand: cd server && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
